<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Blog preview card</title>

  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body class="d-flex flex-column justify-content-center align-items-center min-vh-100 gap-4 p-3">

  <div class="card p-4 border-dark rounded-4">

    <img class="img-fluid rounded-3 mb-4" src="./assets/images/illustration-article.svg" alt="Blog illustration">

    <p class="tag d-inline-block small px-2 py-1 rounded-2 mb-3">Learning</p>

    <p class="small fw-medium mb-3">Published 21 Dec 2023</p>

    <h1 class="title fs-4 mb-3">
      <a href="#" class="text-black text-decoration-none">HTML and CSS foundations</a>
    </h1>

    <p class="text fw-medium lh-base mb-4">
      These languages are the backbone of every website, defining structure, content, and presentation.
    </p>

    <div class="d-flex align-items-center gap-2">
      <img class="avatar rounded-circle" src="./assets/images/image-avatar.webp" alt="Greg Hooper">
      <span class="name small">Greg Hooper</span>
    </div>

  </div>

  <footer class="attribution text-center small">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Brittany</a>.
  </footer>

</body>

</html>
